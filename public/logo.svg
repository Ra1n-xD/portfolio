    L 200 150
    Q 170 150 170 180
    L 170 340
    Q 170 370 200 370
    L 200 400
    Z
  " fill="url(#g)"/>

  <!-- Middle horizontal bar (detached, floating) -->
  <path d="
    M 200 230
    L 300 230
    Q 318 230 318 248
    L 318 252
    Q 318 270 300 270
    L 200 270
    Z
  " fill="url(#g)"/>

  <!-- Diamond accent at end of middle bar -->
